name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Workload
        run: dotnet workload install maui-android

      - name: 🔨 Build APK (Brute Force)
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          # Usando flags que forçam o targets do Android a gerar o APK sem frescura
          dotnet build "$PROJECT_FILE" -c Release -f net9.0-android \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:IntermediateOutputPath=obj/Release/net9.0-android/ \
            -p:PublishAndroidPackage=true \
            -t:SignAndroidPackage

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          # No .NET 9 o APK fica escondido na pasta 'signed' mesmo sem chave
          find . -name "*-Signed.apk" -type f -exec cp {} ./drop/ \;
          find . -name "*.apk" -type f -exec cp {} ./drop/ \;
          echo "📂 Conteúdo final do drop:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-Install-Package
          path: drop/
          if-no-files-found: error
          
