name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Workload
        run: dotnet workload install maui-android

      - name: 🔨 Build APK (Force Package)
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet publish "$PROJECT_FILE" -f net9.0-android -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:CreatePackage=true \
            -p:OutputItemType=Apk

      - name: 🔍 Debug & Collect
        run: |
          mkdir -p drop
          # Procura qualquer arquivo .apk no servidor inteiro e move pro drop
          find . -name "*.apk" -type f -exec cp {} ./drop/ \;
          echo "📂 Arquivos encontrados para download:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-Install
          path: drop/
          if-no-files-found: error
          
