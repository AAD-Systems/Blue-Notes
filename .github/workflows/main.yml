name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Workloads
        run: |
          # A ordem dos fatores aqui altera o produto no CLI do .NET
          dotnet workload install maui-android --accept-license-agreements

      - name: 🔨 Build APK
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          # 'build' limpo com flags explícitas para gerar o arquivo físico
          dotnet build "$PROJECT_FILE" -c Release -f net9.0-android \
            -p:PublishAndroidPackage=true \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          # Busca profunda para ignorar a estrutura de pastas do .NET 9
          find . -name "*.apk" -type f -exec cp {} ./drop/ \;
          echo "📂 Arquivos capturados:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-App-Package
          path: drop/
          if-no-files-found: error
          
