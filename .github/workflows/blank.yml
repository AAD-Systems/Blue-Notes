name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Workloads
        run: |
          dotnet workload install maui-android
          dotnet restore

      - name: 🔨 Build APK (The Nuclear Way)
        run: |
          # Usamos o MSBuild direto para forçar o target de publicação do Android
          dotnet build -c Release -f net8.0-android /t:Publish /p:AndroidPackageFormat=apk /p:AndroidKeyStore=false

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          # O find vai buscar o arquivo que o target 'Publish' gera obrigatoriamente
          find . -name "*-Signed.apk" -exec cp {} ./drop/ \;
          find . -name "*.apk" -exec cp {} ./drop/ \;
          echo "Arquivos encontrados:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: drop/
          
