name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SDK_Fix
        run: echo '{"sdk":{"version":"8.0.400","rollForward":"latestFeature"}}' > global.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Workload_Restore
        run: |
          dotnet workload install maui-android
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false

      - name: 🔨 Build & Force Packaging
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          # Usamos dotnet publish com flags de arquivamento forçado
          dotnet publish "$PROJECT_FILE" -f net8.0-android -c Release \
            -p:CheckEolTargetFramework=false \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:CreatePackagePerAbi=false \
            -p:EmbedAssembliesIntoApk=true

      - name: 🔍 Capture Everything
        run: |
          mkdir -p drop
          echo "🔎 Procurando QUALQUER instalador..."
          # O segredo: buscar no servidor inteiro por .apk ou .aab
          find . -name "*.apk" -exec cp {} ./drop/ \;
          find . -name "*.aab" -exec cp {} ./drop/ \;
          echo "Conteúdo final da pasta de upload:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-Installers
          path: drop/
          
