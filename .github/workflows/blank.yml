name: 🔵 Blue Notes — Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  # Esta variável silencia o erro de fim de suporte em nível global no Runner
  DOTNET_SKIP_WORKLOAD_INTEGRITY_CHECK: true
  CheckEolTargetFramework: false

jobs:
  build-android:
    name: 📦 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📲 Install MAUI Android workload
        run: dotnet workload install maui-android --ignore-failed-sources

      - name: 📦 Restore & Build APK
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ ERRO: Arquivo .csproj não encontrado!"
            exit 1
          fi
          
          echo "🚀 Projeto encontrado: $PROJECT_FILE"
          
          # Restore e Publish ignorando explicitamente o erro NETSDK1202
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false
          
          dotnet publish "$PROJECT_FILE" \
            -f net8.0-android \
            -c Release \
            -p:CheckEolTargetFramework=false \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:EmbedAssembliesIntoApk=true \
            -o ./artifacts/

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: ./artifacts/**/*.apk
          retention-days: 30
          
