name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup
        run: echo '{"sdk":{"version":"8.0.400","rollForward":"latestFeature"}}' > global.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🔧 Version Fix
        run: |
          PROJECT_DIR=$(find . -name "*.csproj" -exec dirname {} \;)
          for dir in $PROJECT_DIR; do
            echo "<Project><PropertyGroup><CheckEolTargetFramework>false</CheckEolTargetFramework><SupportedOSPlatformVersion>24.0</SupportedOSPlatformVersion></PropertyGroup></Project>" > "$dir/Directory.Build.props"
          done

      - name: 📦 Workload & Restore
        run: |
          dotnet workload install maui-android
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false

      - name: 🔨 Force APK Generation
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          # O segredo é o Target 'SignAndroidPackage' - ele força a criação do APK mesmo sem KeyStore (ele gera um temporário)
          dotnet build "$PROJECT_FILE" -c Release -f net8.0-android \
            -t:SignAndroidPackage \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:CheckEolTargetFramework=false

      - name: 🔍 Capture APK
        run: |
          mkdir -p drop
          echo "🔎 Vasculhando o servidor..."
          # Procura em tudo, inclusive pastas ocultas
          find . -name "*.apk" -exec cp {} ./drop/ \;
          echo "Arquivos encontrados:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-Package
          path: drop/
          
