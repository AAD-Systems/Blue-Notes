name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
  # FORÇA O SDK A IGNORAR O FIM DE SUPORTE NO NÍVEL DO SISTEMA
  DOTNET_GENERATE_ASPNET_CORE_HTTPS_CHECK: 'false'
  CheckEolTargetFramework: 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📝 Config Override
        run: |
          # Cria um arquivo de configuração que o .NET é obrigado a ler antes de tudo
          echo "export MSBUILDDISABLENODEREUSE=1" >> $GITHUB_ENV
          echo "export CheckEolTargetFramework=false" >> $GITHUB_ENV
          
          # Injeta a propriedade diretamente em um arquivo de props global
          PROJECT_DIR=$(find . -name "*.csproj" -exec dirname {} \;)
          echo '<Project><PropertyGroup><CheckEolTargetFramework>false</CheckEolTargetFramework></PropertyGroup></Project>' > "$PROJECT_DIR/Directory.Build.props"

      - name: 📦 Install Workloads & Restore
        run: |
          # Desabilita o erro explicitamente na chamada do workload
          dotnet workload install maui-android --configfile NuGet.config || dotnet workload install maui-android
          
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false

      - name: 🔨 Build APK (Ultimate Force)
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          
          # Build usando flags redundantes para garantir
          dotnet build "$PROJECT_FILE" -c Release -f net8.0-android /t:Publish \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:CheckEolTargetFramework=false \
            -p:SupportedOSPlatformVersion=24.0

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          find . -name "*-Signed.apk" -exec cp {} ./drop/ \;
          find . -name "*.apk" -exec cp {} ./drop/ \;
          echo "📂 Arquivos na pasta drop:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: drop/
          
