name: 🔵 Blue Notes — Build APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🛠️ SDK 8
        run: echo '{"sdk":{"version":"8.0.400","rollForward":"latestFeature"}}' > global.json
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: 🛠️ Bypass
        run: |
          PROJECT_DIR=$(find . -name "*.csproj" -exec dirname {} \;)
          for dir in $PROJECT_DIR; do
            echo "<Project><PropertyGroup><CheckEolTargetFramework>false</CheckEolTargetFramework><SupportedOSPlatformVersion>24.0</SupportedOSPlatformVersion></PropertyGroup></Project>" > "$dir/Directory.Build.props"
          done
      - name: 📦 Workload & Restore
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet workload restore "$PROJECT_FILE"
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false
      - name: 🔨 Publish
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet publish "$PROJECT_FILE" -f net8.0-android -c Release -p:CheckEolTargetFramework=false -p:AndroidPackageFormat=apk -p:AndroidKeyStore=false -p:EmbedAssembliesIntoApk=true -o ./artifacts/
      - uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: ./artifacts/**/*.apk
		  
