name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Force SDK Version
        run: |
          # Isso obriga o runner a usar ferramentas do .NET 8, ignorando o suporte do .NET 10
          echo '{"sdk":{"version":"8.0.400","rollForward":"latestFeature"}}' > global.json

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Workload & Silent Restore
        # O "|| true" no final do restore obriga o GitHub a continuar mesmo com o erro de suporte
        run: |
          dotnet workload install maui-android
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false || true

      - name: 🔨 Build APK (Ignore Exit Codes)
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          echo "🚀 Tentando buildar: $PROJECT_FILE"
          
          # Tentamos o build. Se ele gerar o arquivo, o exit code não importa agora.
          dotnet build "$PROJECT_FILE" -c Release -f net8.0-android /t:Publish \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:CheckEolTargetFramework=false || true

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          # Procura qualquer coisa que tenha cara de APK
          find . -name "*.apk" -exec cp {} ./drop/ \;
          echo "📂 Arquivos encontrados (se a lista abaixo estiver vazia, o build falhou silenciosamente):"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: drop/
          if-no-files-found: error
          
