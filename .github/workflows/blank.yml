name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Workloads & Restore
        run: |
          dotnet workload install maui-android
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          # A FLAG MÁGICA AQUI:
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false

      - name: 🔨 Build APK (Ignore Support Warning)
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          echo "🚀 Compilando: $PROJECT_FILE"
          
          # A FLAG MÁGICA AQUI TAMBÉM:
          dotnet build "$PROJECT_FILE" -c Release -f net8.0-android /t:Publish \
            /p:AndroidPackageFormat=apk \
            /p:AndroidKeyStore=false \
            /p:CheckEolTargetFramework=false

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          find . -name "*-Signed.apk" -exec cp {} ./drop/ \;
          find . -name "*.apk" -exec cp {} ./drop/ \;
          echo "📂 Drop folder content:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: drop/
          
