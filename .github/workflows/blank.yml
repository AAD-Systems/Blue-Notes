name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Install Workloads & Restore
        run: |
          dotnet workload install maui-android
          # Busca o projeto para garantir que o restore funcione na pasta certa
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet restore "$PROJECT_FILE"

      - name: 🔨 Build APK (Nuclear + Path Fix)
        run: |
          # Localiza o arquivo de projeto novamente
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          echo "🚀 Compilando o projeto encontrado em: $PROJECT_FILE"
          
          # Executa o build nuclear apontando para o arquivo específico
          dotnet build "$PROJECT_FILE" -c Release -f net8.0-android /t:Publish /p:AndroidPackageFormat=apk /p:AndroidKeyStore=false

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          # Busca recursiva para garantir que pegamos o APK independente de onde ele caiu
          find . -name "*-Signed.apk" -exec cp {} ./drop/ \;
          find . -name "*.apk" -exec cp {} ./drop/ \;
          echo "📂 Conteúdo da pasta drop para upload:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: drop/
          
