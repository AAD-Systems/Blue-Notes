name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SDK_Fix
        run: echo '{"sdk":{"version":"8.0.400","rollForward":"latestFeature"}}' > global.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Version_Match_Fix
        run: |
          PROJECT_DIR=$(find . -name "*.csproj" -exec dirname {} \;)
          for dir in $PROJECT_DIR; do
            echo "<Project><PropertyGroup><CheckEolTargetFramework>false</CheckEolTargetFramework><SupportedOSPlatformVersion>24.0</SupportedOSPlatformVersion></PropertyGroup></Project>" > "$dir/Directory.Build.props"
          done

      - name: Workload_Restore
        run: |
          dotnet workload install maui-android
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false

      - name: 🔨 Build & Force APK
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          # ADICIONAMOS O -r android-arm64 PARA FORÇAR O EMPACOTAMENTO
          dotnet publish "$PROJECT_FILE" -f net8.0-android -c Release \
            -r android-arm64 \
            -p:CheckEolTargetFramework=false \
            -p:SupportedOSPlatformVersion=24.0 \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:EmbedAssembliesIntoApk=true \
            --self-contained

      - name: 🔍 Find and Collect
        run: |
          mkdir -p drop
          echo "📂 Buscando arquivos..."
          # O find agora busca por tudo, inclusive arquivos sem assinatura
          find . -name "*.apk" -exec cp {} ./drop/ \;
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-Final-APK
          path: drop/
          
