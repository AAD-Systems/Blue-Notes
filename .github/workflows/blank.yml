name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    # MUDANÇA CRUCIAL: Saindo do ubuntu-latest para o 22.04
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 📦 Workload & Restore
        run: |
          dotnet workload install maui-android
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false

      - name: 🔨 Build APK (The Last Stand)
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          # Usamos o publish porque ele é mais completo para gerar o binário final
          dotnet publish "$PROJECT_FILE" -f net8.0-android -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:CheckEolTargetFramework=false \
            -p:SupportedOSPlatformVersion=24.0

      - name: 🔍 Collect Artifact
        run: |
          mkdir -p drop
          # Busca profunda por APKs
          find . -name "*.apk" -exec cp {} ./drop/ \;
          echo "📂 Arquivos encontrados:"
          ls -R ./drop

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK-U22
          path: drop/
          
