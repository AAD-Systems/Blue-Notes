name: 🔵 Blue Notes — Build & Release APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-android:
    name: 📦 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🛠️ Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🛠️ Global Config Bypass
        run: |
          echo '<Project>
            <PropertyGroup>
              <CheckEolTargetFramework>false</CheckEolTargetFramework>
              <SuppressNETCoreSdkPreviewMessage>true</SuppressNETCoreSdkPreviewMessage>
            </PropertyGroup>
          </Project>' > Directory.Build.props

      - name: 📲 Install Android Workload
        run: dotnet workload install android --ignore-failed-sources

      - name: 📦 Restore & Build APK
        run: |
          PROJECT_FILE=$(find . -name "*.csproj" -print -quit)
          echo "🚀 Projeto encontrado: $PROJECT_FILE"
          
          dotnet restore "$PROJECT_FILE" -p:CheckEolTargetFramework=false
          
          dotnet publish "$PROJECT_FILE" \
            -f net8.0-android \
            -c Release \
            -p:CheckEolTargetFramework=false \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -p:EmbedAssembliesIntoApk=true \
            -o ./artifacts/

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK
          path: ./artifacts/**/*.apk
          retention-days: 30
          
