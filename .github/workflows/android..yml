name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: 🛡️ Force SDK Registration
        shell: pwsh
        run: |
          # 1. Garante que o workload seja instalado E registrado no caminho do usuário
          dotnet workload install maui-android android --include-pre-release
          
          # 2. Força o .NET a reconstruir o índice de SDKs
          dotnet nuget locals all --clear

      - name: 🔨 Build APK (Context Injection)
        shell: pwsh
        run: |
          $projFile = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1 -ExpandProperty FullName
          
          # Em vez de dotnet publish, usamos o MSBuild direto via 'dotnet build' 
          # com parâmetros que forçam a resolução do SDK do Android
          dotnet build "$projFile" -c Release -f net9.0-android `
            -p:AndroidPackageFormat=apk `
            -p:AndroidKeyStore=false `
            -p:PublishAndroidPackage=true `
            -p:EmbedAssembliesIntoApk=true `
            --no-restore 

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK-Final
          path: |
            **/bin/Release/net9.0-android/*.apk
          if-no-files-found: error
          
