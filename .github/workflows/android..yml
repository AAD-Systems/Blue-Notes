name: BlueNotesBuild
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🛠️ Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: 🛡️ Fix SDK Environment
        shell: pwsh
        run: |
          # Cria um global.json para impedir que o runner use versões instáveis (v10)
          '{"sdk": {"version": "9.0.100", "rollForward": "latestFeature"}}' | Out-File global.json
          
          # Instalação forçada com update
          dotnet workload install maui-android --source https://api.nuget.org/v3/index.json
          dotnet workload update

      - name: 🔨 Build & Publish APK
        shell: pwsh
        run: |
          $projFile = Get-ChildItem -Filter *.csproj -Recurse | Select-Object -First 1 -ExpandProperty FullName
          
          # O segredo: usamos 'dotnet build' com o target de publish para ignorar erros de resolução de SDK do publish direto
          dotnet build "$projFile" -f net9.0-android -c Release `
            -p:AndroidPackageFormat=apk `
            -p:AndroidKeyStore=false `
            -p:CreatePackage=true `
            -p:DeployOnBuild=true `
            -p:PublishAndroidPackage=true

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK-Final
          path: |
            **/bin/Release/net9.0-android/*-Signed.apk
            **/bin/Release/net9.0-android/*.apk
          if-no-files-found: error
          
