name: 🔵 Blue Notes — Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*.*'   # Trigger on version tags like v0.0.0.0.1
  workflow_dispatch:  # Allow manual trigger

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH:   'BlueNotes/BlueNotes.csproj'

jobs:
  # ────────────────────────────────────────────────────────────────
  build-android:
    name: 📦 Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: ⬇️  Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. .NET setup
      - name: 🛠️  Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # 3. Install MAUI workload
      - name: 📲  Install .NET MAUI workload
        run: |
          dotnet workload install maui-android
          dotnet workload restore ${{ env.PROJECT_PATH }}

      # 4. Java (required for Android build)
      - name: ☕  Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 5. Android SDK
      - name: 🤖  Setup Android SDK
        uses: android-actions/setup-android@v3

      # 6. Restore NuGet packages
      - name: 📦  Restore NuGet packages
        run: dotnet restore ${{ env.PROJECT_PATH }}

      # 7. Build release APK (unsigned)
      - name: 🔨  Build Release APK
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            -f net8.0-android \
            -c Release \
            -p:AndroidPackageFormat=apk \
            -p:AndroidKeyStore=false \
            -o ./artifacts/

      # 8. Find and rename APK
      - name: 🔍  Locate APK
        run: |
          find . -name "*.apk" | head -5
          APK=$(find ./artifacts -name "*.apk" | head -1)
          cp "$APK" ./artifacts/BlueNotes-${{ github.ref_name }}.apk
          echo "APK_PATH=./artifacts/BlueNotes-${{ github.ref_name }}.apk" >> $GITHUB_ENV

      # 9. Upload artifact (available in Actions tab)
      - name: 📤  Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BlueNotes-APK-${{ github.ref_name }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # 10. Create GitHub Release with APK attached
      - name: 🚀  Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 🔵 Blue Notes ${{ github.ref_name }}
          body_path: .github/RELEASE_TEMPLATE.md
          files: ${{ env.APK_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, '0.0.0') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
